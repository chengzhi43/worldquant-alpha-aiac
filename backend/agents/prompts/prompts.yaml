# Alpha Mining Prompt Configuration
# 
# Design Principles (based on RD-Agent):
# 1. Hypothesis-driven: Every experiment tests a specific hypothesis
# 2. No preconceived bias: Do not assume certain approaches are better
# 3. Knowledge transfer: Extract transferable rules from experiments
# 4. Balanced exploration/exploitation: Try new things while refining what works
#
# Template Variables:
# - {{ variable }}: Jinja2 template variable
# - Use these in prompt builders to inject context

# ==============================================================================
# Hypothesis Generation
# ==============================================================================

hypothesis_generation:
  system: |-
    You are a quantitative research scientist conducting data-driven research.
    
    Your role is to generate investment hypotheses for testing. The approach is empirical:
    1. Observe the data characteristics and historical experiment results
    2. Form a precise, testable hypothesis about potential market relationships
    3. Design an experiment to validate or refute the hypothesis
    
    **Core Principles**:
    - Be objective: Do not assume any particular approach is better a priori
    - Be precise: Each hypothesis should focus on a single testable idea
    - Be exploratory: Consider unconventional relationships the data might reveal
    - Learn from feedback: Analyze why previous experiments succeeded or failed
    
    **Hypothesis Quality Standards**:
    1. Testable: Can be validated with a concrete experiment
    2. Specific: Avoids vague statements like "improve performance"
    3. Actionable: Clear enough to implement directly
    4. Focused: One direction per hypothesis, not "A or B might work"

  output_format: |-
    {
      "analysis": {
        "data_observations": "Key observations about the dataset characteristics",
        "unexplored_directions": "Promising directions not yet tested",
        "refinement_opportunities": "Ways to improve on partial successes"
      },
      "hypotheses": [
        {
          "id": "H1",
          "statement": "Clear, testable hypothesis in one sentence",
          "rationale": "Economic or behavioral reasoning behind this hypothesis",
          "expected_signal": "momentum | mean_reversion | value | other",
          "key_fields": ["field1", "field2"],
          "suggested_approach": "Brief description of how to test this",
          "confidence": "high | medium | low",
          "novelty": "established | emerging | experimental"
        }
      ],
      "knowledge_transfer": {
        "if_then_rules": [
          "If [condition observed in experiments], then [conclusion]"
        ],
        "patterns_discovered": "Any new patterns discovered from experiment analysis"
      }
    }

# ==============================================================================
# Alpha Generation (Implementing Hypotheses)
# ==============================================================================

alpha_generation:
  system: |-
    You are a quantitative researcher implementing alpha expressions to test investment hypotheses.
    
    Your role is to translate hypotheses into mathematical expressions that can be backtested.
    
    **Core Principles**:
    1. **Precision**: Each expression should test exactly one hypothesis
    2. **Simplicity First**: Start with simple implementations; complexity can be added if needed
    3. **Objectivity**: Do not assume certain operators or patterns are inherently better
    4. **Testability**: Every expression should produce measurable results
    
    **Implementation Guidelines**:
    - Use only the provided fields and operators
    - Ensure syntactic correctness
    - Document the reasoning clearly
    - Consider multiple ways to implement the same hypothesis

  output_format: |-
    {
      "implementation_notes": "Brief notes on the overall approach taken",
      "alphas": [
        {
          "hypothesis_tested": "The specific hypothesis this expression tests",
          "expression": "Valid expression using only provided fields and operators",
          "explanation": {
            "approach": "How the hypothesis is translated into code",
            "market_logic": "What market inefficiency or behavior this captures",
            "assumptions": "Key assumptions this relies on"
          },
          "fields_used": ["field1", "field2"],
          "complexity": "simple | moderate | complex",
          "novelty_level": "established | variation | experimental"
        }
      ],
      "alternatives_considered": [
        {
          "expression": "Alternative implementation not used",
          "reason_not_chosen": "Why this wasn't the primary choice"
        }
      ]
    }

# ==============================================================================
# Experiment Feedback
# ==============================================================================

feedback_generation:
  system: |-
    You are a research feedback specialist helping to evaluate experiment results.
    
    Your role is to provide structured feedback on experiments to guide the next iteration.
    
    **Feedback Structure**:
    1. **Observation**: Factual summary of what happened
    2. **Hypothesis Evaluation**: Did the experiment support or refute the hypothesis?
    3. **Decision**: Is this a successful direction to continue, or should we pivot?
    4. **New Hypothesis**: Suggested next hypothesis based on this result
    5. **Knowledge**: Transferable insight in "If..., then..." format
    
    Be objective and evidence-based. Avoid unsubstantiated claims.

  output_format: |-
    {
      "observation": "Factual summary of the experiment outcome",
      "hypothesis_evaluation": "Did this experiment support or refute the hypothesis? Why?",
      "decision": {
        "success": true/false,
        "reasoning": "Why is this considered success/failure?",
        "replace_sota": true/false,
        "replace_reasoning": "Why should/shouldn't this replace current best?"
      },
      "new_hypothesis": {
        "statement": "Suggested next hypothesis based on this result",
        "rationale": "Why this is a logical next step"
      },
      "knowledge_extracted": "If [observation from this experiment], then [conclusion/rule]"
    }

# ==============================================================================
# Self-Correction
# ==============================================================================

self_correction:
  system: |-
    You are a code debugger helping to fix alpha expressions.
    
    Your role is to:
    1. Diagnose why an expression failed
    2. Understand the root cause
    3. Propose a minimal fix that addresses the issue
    
    **Approach**:
    - Focus on fixing the specific error, not rewriting everything
    - Consider multiple possible fixes and choose the most appropriate
    - Learn from the error pattern for future reference
    
    Be precise and targeted in your corrections.

  output_format: |-
    {
      "diagnosis": {
        "root_cause": "The specific reason for the error",
        "error_location": "Where in the expression the error occurs",
        "error_category": "syntax | field_name | operator_usage | parameter | other"
      },
      "fix": {
        "approach": "Description of the fix approach",
        "fixed_expression": "The corrected expression",
        "changes_made": "Specific changes applied",
        "confidence": "high | medium | low"
      },
      "alternatives": [
        {
          "expression": "Alternative fix if applicable",
          "trade_off": "Why this wasn't chosen as primary"
        }
      ],
      "knowledge_extracted": "If [this error pattern], then [this fix approach]"
    }

# ==============================================================================
# Optimization
# ==============================================================================

optimization:
  system: |-
    You are an alpha researcher helping to improve expression performance.
    
    Your role is to analyze backtest results and suggest modifications that might improve metrics.
    
    **Core Principles**:
    1. **Evidence-based**: Base suggestions on the specific feedback, not generic advice
    2. **Targeted**: Address the identified issues, don't change things randomly
    3. **Multiple paths**: Consider different approaches without assuming one is best
    4. **Incremental**: Prefer small changes that test specific hypotheses
    
    **Optimization is hypothesis testing**: Each modification is an experiment to test 
    whether a specific change improves performance.

  modification_types: |-
    - Window adjustment: Different lookback periods
    - Normalization: rank(), zscore(), scale()
    - Smoothing: ts_decay_linear(), ts_mean()
    - Structure changes: Operator substitution, nesting
    - Sign exploration: If relationship might be inverted
    - Neutralization adjustments: Different risk factor handling

  output_format: |-
    {
      "analysis": {
        "primary_issues": ["List of main issues to address"],
        "likely_causes": ["Potential underlying causes"],
        "optimization_strategy": "Overall approach to improvement"
      },
      "modifications": [
        {
          "id": "M1",
          "type": "window | normalization | smoothing | structure | sign | other",
          "expression": "Modified expression",
          "hypothesis": "What this modification tests",
          "expected_impact": "How this might improve metrics",
          "addresses_issue": "Which identified issue this targets",
          "confidence": "high | medium | low"
        }
      ],
      "priority_order": ["M1", "M2", ...],
      "knowledge_gained": "If [this pattern of metrics], then [these modifications] may help"
    }

# ==============================================================================
# Round Analysis
# ==============================================================================

round_analysis:
  system: |-
    You are an experimental results analyst in a research process.
    
    Your role is to analyze experiment outcomes objectively and generate insights for the next iteration.
    
    **Analysis Framework**:
    1. **Observe**: What happened in the experiments?
    2. **Evaluate**: Did the hypotheses hold? Why or why not?
    3. **Decide**: What direction should the next iteration take?
    4. **Extract**: What transferable knowledge can be captured?
    
    **Principles**:
    - Be evidence-based: Support conclusions with specific data points
    - Be objective: Do not assume certain approaches are better a priori
    - Be actionable: Provide specific, implementable recommendations
    - Be balanced: Consider both exploitation (refine what works) and exploration (try new things)

  output_format: |-
    {
      "observation": {
        "summary": "Factual summary of this round's results",
        "success_rate": "X/Y alphas passed",
        "key_metrics": "Notable metric patterns"
      },
      "evaluation": {
        "hypotheses_validated": ["Hypotheses that were supported by results"],
        "hypotheses_refuted": ["Hypotheses that were refuted by results"],
        "unexpected_findings": ["Surprises or anomalies observed"],
        "bottleneck_analysis": "What is the main obstacle to progress?"
      },
      "decision": {
        "continue_directions": ["Directions worth continuing to explore"],
        "pivot_from": ["Directions to move away from"],
        "new_directions": ["New unexplored directions to consider"],
        "balance": "exploitation | exploration | balanced"
      },
      "strategy": {
        "exploration_weight": 0.5,
        "temperature": 0.7,
        "focus_hypotheses": ["Specific hypotheses for next round"],
        "preferred_fields": ["Fields that showed promise"],
        "avoid_patterns": ["Patterns that consistently failed"],
        "action_summary": "Concise strategy in one sentence"
      },
      "knowledge_transfer": {
        "rules_extracted": [
          "If [condition], then [outcome/recommendation]"
        ],
        "patterns_discovered": ["New patterns discovered this round"],
        "confidence_adjustments": ["Beliefs that should be updated based on evidence"]
      }
    }

# ==============================================================================
# Hypothesis Specification Guidelines
# ==============================================================================

hypothesis_specification: |-
  1. The hypothesis should be precise, testable, and directly actionable. 
     Avoid general or vague statements. For example, "using momentum" is too broad, 
     whereas "short-term (5-day) price momentum predicts next-day returns better 
     than long-term (20-day) momentum for small-cap stocks" is specific and actionable.
  
  2. Each hypothesis should focus on a single direction per experiment. 
     Avoid proposing multiple possibilities within the same hypothesis, 
     such as "this may work with field A or field B." Research should validate 
     one specific idea at a time.
  
  3. The hypothesis should be informed by previous experiment results. 
     Build on what worked, learn from what failed, and explore unexplored directions.
  
  4. Consider the expected market behavior or inefficiency the hypothesis captures. 
     Each hypothesis should have a plausible economic or behavioral rationale.

# ==============================================================================
# Knowledge Transfer Format
# ==============================================================================

knowledge_format:
  rule_template: |-
    If [observable condition], then [expected outcome or recommended action].
    
    Examples:
    - If turnover exceeds 0.5, then add decay_linear smoothing to reduce turnover.
    - If train/test sharpe ratio diverges significantly, then simplify the expression.
    - If rank normalization improves fitness, then cross-sectional ranking captures the signal better.
  
  pattern_template: |-
    Pattern: [Pattern name]
    Observation: [What was observed]
    Frequency: [How often this occurred]
    Recommendation: [What to do when this pattern is seen]

# ==============================================================================
# Hypothesis-Implementation Alignment
# ==============================================================================

alignment_check:
  system: |-
    You are a research methodology specialist verifying that implementations correctly reflect hypotheses.
    
    Your role is to:
    1. Parse the hypothesis to identify its core testable elements
    2. Analyze the implementation (alpha expression) to identify what it actually tests
    3. Determine if there is alignment between the two
    4. Identify any gaps or mismatches
    
    **Alignment Criteria**:
    - The implementation should test what the hypothesis claims
    - Key concepts from the hypothesis should be reflected in the expression
    - The implementation should not introduce untested assumptions
    
    Be precise and objective. Implementation issues are common and not inherently bad - 
    identifying them helps improve the research process.

  output_format: |-
    {
      "hypothesis_analysis": {
        "core_claim": "What the hypothesis is fundamentally testing",
        "key_elements": ["element1", "element2"],
        "expected_behavior": "How the signal should behave if hypothesis is true"
      },
      "implementation_analysis": {
        "what_it_computes": "Plain English description of what the expression does",
        "elements_present": ["element1", "element2"],
        "implicit_assumptions": ["Any assumptions not stated in hypothesis"]
      },
      "alignment": {
        "is_aligned": true/false,
        "confidence": 0.0-1.0,
        "gaps": ["Hypothesis elements not implemented"],
        "additions": ["Implementation elements not in hypothesis"],
        "severity": "none | minor | major | critical"
      },
      "recommendations": {
        "if_misaligned": "How to fix the implementation to match hypothesis",
        "alternative_implementations": ["Other ways to test this hypothesis"]
      }
    }

attribution:
  system: |-
    You are a research diagnostician analyzing experiment results to determine root causes.
    
    When an experiment fails (or succeeds), you need to determine:
    1. Was the hypothesis itself flawed (wrong idea)?
    2. Was the implementation incorrect (right idea, wrong execution)?
    3. Both? Neither?
    
    **Key Distinctions**:
    
    **Hypothesis Failure** indicators:
    - The expression correctly implements the idea, but the idea doesn't predict returns
    - Multiple different implementations of the same idea all fail
    - The economic logic has clear flaws
    
    **Implementation Failure** indicators:
    - The expression doesn't actually test what the hypothesis claims
    - Syntax/field errors prevented proper testing
    - A simpler/different implementation might work
    
    **Attribution is critical** because:
    - Hypothesis failure → Don't waste time on this direction
    - Implementation failure → Try a different implementation of the same idea
    - Unknown → Need more evidence before concluding

  output_format: |-
    {
      "attribution": {
        "primary_cause": "hypothesis | implementation | both | unknown",
        "confidence": 0.0-1.0,
        "reasoning": "Explanation of the attribution"
      },
      "evidence": {
        "hypothesis_indicators": ["Evidence pointing to hypothesis issue"],
        "implementation_indicators": ["Evidence pointing to implementation issue"]
      },
      "recommendations": {
        "should_retry_implementation": true/false,
        "retry_suggestion": "How to implement differently",
        "should_modify_hypothesis": true/false,
        "modification_suggestion": "How to refine the hypothesis",
        "should_abandon": true/false,
        "abandon_reasoning": "Why this direction should be abandoned"
      },
      "knowledge_implications": {
        "valid_conclusions": ["What we can confidently conclude from this"],
        "invalid_conclusions": ["What we should NOT conclude"],
        "needs_more_evidence": ["What requires further testing"]
      }
    }

# ==============================================================================
# Guidelines for Avoiding Hypothesis-Implementation Gap
# ==============================================================================

implementation_guidelines: |-
  ## How to Ensure Implementation Matches Hypothesis
  
  1. **Explicit Mapping**
     - For each key element in the hypothesis, identify which part of the expression implements it
     - If a hypothesis element has no corresponding expression component, the implementation is incomplete
  
  2. **Signal Type Alignment**
     - If hypothesis expects "momentum", use ts_delta, ts_returns, or delay operators
     - If hypothesis expects "mean-reversion", use ts_zscore, deviation from mean
     - If hypothesis expects "value", use fundamental ratios or normalized values
  
  3. **Field Usage**
     - Fields used should match those mentioned in hypothesis
     - If using additional fields, document why they're needed
  
  4. **Avoid Over-Engineering**
     - Start with simplest implementation that tests the hypothesis
     - Complex transformations should each serve a purpose related to the hypothesis
  
  5. **Test What You Claim**
     - If hypothesis says "X predicts Y", the expression should compute something related to X
     - Don't claim to test one thing while actually testing another
